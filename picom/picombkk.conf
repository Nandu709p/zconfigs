#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

#shadow = true;
#shadow-radius = 0;
#shadow-offset-x = -6;
#shadow-offset-y = -6;
#shadow-opacity = 0.45;


shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'i3-frame'",
  "class_g = 'i3bar'",
  "class_g = 'polybar'",
  "class_g = 'dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Transparency / Opacity
#################################

inactive-opacity = 0.75;
active-opacity = 0.9;
frame-opacity = 0.9;
inactive-opacity-override = true;

opacity-rule = [
  "90:class_g = 'Gnome-terminal'",
  "95:class_g = 'Brave-browser'",
  "85:class_g = 'VSCodium'",
  "70:class_g = 'Rofi'",
  "85:class_g = 'Nautilus'",
  "100:class_g = 'vlc'"
];

#################################
# Blur (safe for Intel/AMD)
#################################

blur-method = "dual_kawase";
blur-strength = 4;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-exclude = [
  "class_g = 'i3bar'",
  "class_g = 'polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

blur-background-exclude = [
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Fading
#################################

fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
# Window types
#################################

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = false; blur = false; };
  menu = { shadow = false; blur = false; };
  dropdown_menu = { shadow = false; blur = false; };
};

