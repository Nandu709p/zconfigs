backend = "glx";
vsync = true;
glx-swap-method = "copy";
dbe = true;

inactive-opacity = 0.7;
active-opacity = 0.9;
frame-opacity = 0.9;

opacity-rule = [
  "100:class_g = 'mpv'",
  "100:class_g = 'Brave-browser'",
  "100:class_g = 'Rofi'",
  "100:class_g = 'dmenu'",
  "100:class_g = 'Surf'"
]

corner-radius = 0;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3-frame'",
    "window_type = 'dock'",
    "window_type = 'tooltip'"
];

blur-method = "dual_kawase";
blur-strength = 1;
# blur:
# {
#     method = "dual_kawase";
#     strength = 1;
# };
blur-exclude = [
  "class_g = 'i3bar'",
  "class_g = 'polybar'",
];

blur-background-exclude = [
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'popups'",
  "window_type = 'tooltip'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;  
