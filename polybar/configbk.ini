[mycolors]
foreground = #cdd6f4
background = #1e1e2e
highlight = #cba6f7

[colors]
background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.subtext1}

[bar/bottom]
monitor = ${env:MONITOR:}
width = 100%
height = 20pt
radius = 0
; dpi = 96

background = ${mycolors.background}
foreground = ${mycolors.foreground}
top = true
enable-ipc = true
;line-size = 6pt
;border-size = 4pt
;border-color = #00000000
padding-left = 0
padding-right = 2
padding-bottom = 1

module-margin = 1

; separator = |
; separator-foreground = ${colors.flamingo}

font-0 = Firacode Nerd Font:size=10;2
#cursor-click = pointer

modules-left = xworkspaces
modules-center = date os temperature
modules-right = impala wlan bluetooth pulseaudio battery

[module/os]
type = custom/text 
content ="пЊѓ "
content-padding = 0
click-left = gnome-terminal -e btop

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${mycolors.highlight}
label-active-foreground = ${mycolors.background}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = "у°¤­ "

[module/wlan]
inherit = network-base
interface-type = wireless
; label-connected = у°¤Ё оЄќ %downspeed% оЄ  %upspeed%
; label-connected = у°¤Ё %{F-}%essid%
label-connected = у°¤Ё

[module/impala]
type = custom/text
content = у°Ў–
padding-right = 0
padding-left = 0
click-left = gnome-terminal -e impala

[module/bluetooth]
type = custom/text
content = "у°‚Ї"
click-left = gnome-terminal -e bluetui

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = "пЂЁ "
label-muted = "о»Ё "
label-muted-foreground = ${mycolors.foreground}
click-right = exec gnome-terminal -e wiremix

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-padding = 0 
label = %temperature%
label-warn = %temperature%
ramp-0 =  "п‹‰"
;ramp-font = 1
ramp-foreground = #a4ebf3
;label-padding-right = 1

