[module/battery]
type = internal/battery

battery = BAT0
adapter = ADP0
full-at = 99
low-at = 10
poll-interval = 5

# Show only icon when charging/discharging
format-charging = <animation-charging>
format-discharging = <ramp-capacity>

# Show full icon when charged
format-full = <label-full>
label-full = O_^

# Show warning when low
format-low = <animation-low>
label-low = charge me

# Battery charging animation (icon only)
animation-charging-0 = п‰„
animation-charging-1 = п‰ѓ
animation-charging-2 = п‰‚
animation-charging-3 = п‰Ѓ
animation-charging-4 = п‰Ђ
animation-charging-framerate = 500

# Battery capacity icons (used when discharging and full)
ramp-capacity-0 = п‰„ 
ramp-capacity-1 = п‰ѓ 
ramp-capacity-2 = п‰‚ 
ramp-capacity-3 = п‰Ѓ 
ramp-capacity-4 = п‰Ђ 

# Low battery warning animation
animation-low-0 = x
animation-low-1 = !

[settings]
screenchange-reload = true
pseudo-transparency = true

