;   POLYBAR

[global/wm]
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[bar/top]
monitor = ${env:MONITOR:}
top = true
width = 100%
height = 27.5pt
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 0
padding-right = 2
module-margin = 1
enable-ipc = true

modules-left = xworkspaces
modules-center = date 
modules-right = apps network bluetooth btop pulseaudio  battery

font-0 = Cousine Nerd Font:size=12;3

